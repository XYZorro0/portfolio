<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Niket Gupta — Software Engineer. Interactive terminal-style portfolio." />
  <title>niket@portfolio:~$</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Crect width='16' height='16' fill='%230d0d0d'/%3E%3Ctext x='1' y='12' font-family='monospace' font-size='11' fill='%2300ff41'%3E&gt;_%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="style.css" />
  
  <!-- Vercel Web Analytics -->
  <script>
    window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
  <!-- CRT scanline + flicker overlay (purely decorative) -->
  <div class="crt-overlay" aria-hidden="true"></div>
  <div class="crt-flicker" aria-hidden="true"></div>

  <main class="terminal" id="terminal">
    <div class="terminal-header">
      <div class="dots" aria-hidden="true">
        <span class="dot dot-red"></span>
        <span class="dot dot-yellow"></span>
        <span class="dot dot-green"></span>
      </div>
      <div class="title">niket@portfolio: ~</div>
      <div class="header-spacer" aria-hidden="true"></div>
    </div>

    <div class="terminal-body" id="terminal-body">
      <div id="output" aria-live="polite"></div>

      <div class="input-line" id="input-line" hidden>
        <span class="prompt">niket@portfolio:~$</span>
        <input
          id="cmd-input"
          type="text"
          autocomplete="off"
          autocapitalize="off"
          autocorrect="off"
          spellcheck="false"
          aria-label="Terminal command input"
        />
        <span class="cursor" id="cursor"></span>
      </div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
